

services:
  backend:
    build: ./backend
    image: brolly-login-backend:test
    container_name: brolly-test-login-backend
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    ports:
      - "8003:8003"
    restart: always

  frontend:
    build: ./frontend
    image: brolly-login-frontend:test
    container_name: brolly-test-login-frontend
    depends_on:
      - backend
    ports:
      - "3003:80"
    restart: always
