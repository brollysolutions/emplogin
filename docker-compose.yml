# ── PRODUCTION ENVIRONMENT ────────────────────────────────────
name: brolly-production-system
services:
  backend:
    build: ./backend
    image: emplogin-backend:v1
    container_name: brolly-login-backend
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    ports:
      - "8001:8001"
    restart: always

  frontend:
    build: ./frontend
    image: emplogin-frontend:v1
    container_name: brolly-login-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"
    restart: always
